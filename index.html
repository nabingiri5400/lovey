<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love You Heart</title>
<style>
  body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
    color: red;
    font-family: monospace;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<script>
const canvas = document.getElementById('heartCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const text = "love you ";
let t = 0;

// Convert heart parametric equation to points
function heartPoint(t) {
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  return {x, y};
}

// Draw heart with "love you"
function drawHeart(scale) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = 'red';
  ctx.font = `${scale}px monospace`;
  for (let i = 0; i < 1000; i+=8) {
    const a = i/100*2*Math.PI;
    const p = heartPoint(a);
    const letter = text[i % text.length];
    ctx.fillText(letter, canvas.width/2 + p.x*20, canvas.height/2 - p.y*20);
  }
}

// Animate pulsing heart
let scale = 12;
let growing = true;
const animation = setInterval(() => {
  if (growing) scale += 0.5;
  else scale -= 0.5;
  if (scale >= 18) growing = false;
  if (scale <= 12) growing = true;
  drawHeart(scale);
  t += 0.01;
}, 50);

// After 7 seconds, stop animation and show popup
setTimeout(() => {
  clearInterval(animation);
  alert(
`Before you, my days just passed.
Nothing stayed, nothing felt special.
Then you came—
and suddenly the smallest things mattered.
A message from you, a smile from you…
even your silence feels like peace to me.
If one day the world asks me what I truly wanted in life,
my answer will be simple:
Just you. ❤️`
  );
}, 7000);
</script>

</body>
</html>
