<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Animation</title>
<style>
  body {
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: red;
    font-family: monospace;
    flex-direction: column;
    overflow: hidden;
  }
  #heart {
    white-space: pre;
    font-size: 12px;
    line-height: 12px;
    text-align: center;
  }
  #popupBtn {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 18px;
    background: red;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: none;
  }
</style>
</head>
<body>

<div id="heart"></div>
<button id="popupBtn">Click for Secret Message</button>

<script>
const text = "love you ";
const heartDiv = document.getElementById("heart");
const btn = document.getElementById("popupBtn");

// Generate heart shape
function generateHeart() {
    let result = "";
    for (let y = 15; y > -15; y--) {
        let line = "";
        for (let x = -30; x < 30; x++) {
            let formula = Math.pow(x*0.05,2) + Math.pow(y*0.1,2) - 1;
            if (Math.pow(formula,3) - Math.pow(x*0.05,2)*Math.pow(y*0.1,3) <= 0) {
                line += text[(x - y + text.length) % text.length];
            } else {
                line += " ";
            }
        }
        result += line + "\n";
    }
    return result;
}

// Animate heart
let frame = 0;
const totalFrames = 25;
const interval = setInterval(() => {
    heartDiv.textContent = generateHeart();
    frame++;
    if (frame >= totalFrames) {
        clearInterval(interval);
        btn.style.display = "block"; // show button after animation
    }
}, 200);

// Popup with your poetic secret message
btn.addEventListener("click", () => {
    alert(
`Before you, my days just passed.
Nothing stayed, nothing felt special.
Then you came—
and suddenly the smallest things mattered.
A message from you, a smile from you…
even your silence feels like peace to me.
If one day the world asks me what I truly wanted in life,
my answer will be simple:
Just you. ❤️`
    );
});
</script>

</body>
</html>
